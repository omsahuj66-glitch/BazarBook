<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Panel — Smart Kirana</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #7C3AED;
    --primary-light: #A78BFA;
    --primary-glow: rgba(124,58,237,0.12);
    --green: #10B981;
    --red: #EF4444;
    --orange: #F59E0B;
    --bg: #F5F3FF;
    --card: #FFFFFF;
    --ink: #1E1B2E;
    --ink-soft: #4B4670;
    --ink-muted: #9CA3AF;
    --border: #EDE9FE;
    --radius: 16px;
    --shadow: 0 4px 20px rgba(124,58,237,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Mukta',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }

  /* ── AUTH ── */
  .auth-wrap {
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    background: linear-gradient(135deg,#7C3AED 0%,#5B21B6 100%);
  }
  .auth-card {
    background:white; border-radius:24px; padding:32px 28px; width:100%; max-width:400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .auth-logo { font-family:'Baloo 2',cursive; font-size:28px; font-weight:800; color:var(--primary); text-align:center; margin-bottom:4px; }
  .auth-sub { text-align:center; color:var(--ink-muted); font-size:15px; margin-bottom:28px; }
  .tab-row { display:flex; gap:0; background:var(--bg); border-radius:10px; padding:4px; margin-bottom:24px; }
  .tab-btn { flex:1; padding:10px; border:none; border-radius:8px; font-family:'Baloo 2',cursive; font-size:15px; font-weight:600; cursor:pointer; background:transparent; color:var(--ink-soft); transition:all 0.2s; }
  .tab-btn.active { background:var(--primary); color:white; box-shadow:0 2px 10px rgba(124,58,237,0.3); }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
  .form-group input {
    width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:10px;
    font-family:'Mukta',sans-serif; font-size:16px; color:var(--ink); outline:none; transition:border-color 0.2s;
  }
  .form-group input:focus { border-color:var(--primary); }
  .btn { width:100%; padding:15px; border:none; border-radius:10px; font-family:'Baloo 2',cursive; font-size:17px; font-weight:700; cursor:pointer; transition:all 0.2s; }
  .btn-primary { background:linear-gradient(135deg,var(--primary),#5B21B6); color:white; box-shadow:0 4px 16px rgba(124,58,237,0.35); }
  .btn-primary:active { transform:scale(0.98); }

  /* ── APP LAYOUT ── */
  #app { display:none; }
  .top-bar {
    background:linear-gradient(135deg,var(--primary),#5B21B6);
    color:white; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
    box-shadow: 0 2px 20px rgba(124,58,237,0.3);
  }
  .top-bar-title { font-family:'Baloo 2',cursive; font-size:18px; font-weight:700; }
  .logout-btn { background:rgba(255,255,255,0.2); border:none; color:white; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }

  /* ── NAV ── */
  .bottom-nav {
    position:fixed; bottom:0; left:0; right:0;
    background:white; border-top:2px solid var(--border);
    display:flex; z-index:100;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .nav-item { flex:1; padding:12px 4px 8px; text-align:center; cursor:pointer; transition:all 0.2s; border:none; background:none; }
  .nav-item .nav-icon { font-size:22px; display:block; }
  .nav-item .nav-label { font-size:11px; font-weight:600; color:var(--ink-muted); margin-top:2px; display:block; }
  .nav-item.active .nav-label { color:var(--primary); }
  .nav-item.active .nav-icon { filter: drop-shadow(0 2px 4px rgba(124,58,237,0.4)); }

  /* ── SCREENS ── */
  .screen { display:none; padding:16px 16px 90px; }
  .screen.active { display:block; }

  /* ── STAT CARDS ── */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
  .stat-card {
    background:white; border-radius:var(--radius); padding:16px;
    box-shadow:var(--shadow); border:1px solid var(--border); text-align:center;
  }
  .stat-icon { font-size:28px; margin-bottom:6px; }
  .stat-num { font-family:'Baloo 2',cursive; font-size:26px; font-weight:800; color:var(--primary); }
  .stat-label { font-size:12px; color:var(--ink-muted); margin-top:2px; }

  /* ── SECTION ── */
  .section-title { font-family:'Baloo 2',cursive; font-size:18px; font-weight:700; margin-bottom:12px; color:var(--ink); }

  /* ── PRODUCT CARD ── */
  .item-card {
    background:white; border-radius:var(--radius); padding:16px; margin-bottom:12px;
    box-shadow:var(--shadow); border:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .item-icon { width:48px; height:48px; background:var(--primary-glow); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .item-info { flex:1; }
  .item-name { font-family:'Baloo 2',cursive; font-size:16px; font-weight:700; }
  .item-meta { font-size:13px; color:var(--ink-muted); }
  .item-price { font-size:17px; font-weight:700; color:var(--primary); }
  .item-actions { display:flex; flex-direction:column; gap:6px; }
  .icon-btn {
    width:34px; height:34px; border-radius:8px; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .edit-btn { background:#EDE9FE; }
  .del-btn { background:#FEE2E2; }

  /* ── BOOKING CARD ── */
  .booking-card {
    background:white; border-radius:var(--radius); padding:16px; margin-bottom:12px;
    box-shadow:var(--shadow); border:1px solid var(--border);
  }
  .booking-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .booking-id { font-family:'Baloo 2',cursive; font-size:14px; font-weight:700; color:var(--primary); }
  .status-badge {
    padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700;
  }
  .status-pending { background:#FEF3C7; color:#D97706; }
  .status-ready { background:#D1FAE5; color:#065F46; }
  .status-completed { background:#DBEAFE; color:#1D4ED8; }
  .status-cancelled { background:#FEE2E2; color:#991B1B; }
  .booking-row { display:flex; align-items:center; gap:8px; font-size:14px; color:var(--ink-soft); margin-bottom:4px; }
  .trust-stars { color:#F59E0B; font-size:14px; }
  .timer-text { font-family:'Baloo 2',cursive; font-weight:700; color:var(--orange); }
  .status-actions { display:flex; gap:8px; margin-top:12px; }
  .status-btn {
    flex:1; padding:9px; border:none; border-radius:8px; font-family:'Baloo 2',cursive;
    font-size:13px; font-weight:700; cursor:pointer; transition:all 0.2s;
  }
  .btn-ready { background:#D1FAE5; color:#065F46; }
  .btn-done { background:#DBEAFE; color:#1D4ED8; }

  /* ── ADD PRODUCT MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5);
    z-index:200; align-items:flex-end; justify-content:center;
  }
  .modal-overlay.open { display:flex; }
  .modal-sheet {
    background:white; border-radius:24px 24px 0 0; padding:28px 24px 40px;
    width:100%; max-height:85vh; overflow-y:auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-title { font-family:'Baloo 2',cursive; font-size:20px; font-weight:800; margin-bottom:20px; }
  .modal-close { float:right; background:none; border:none; font-size:22px; cursor:pointer; color:var(--ink-muted); }

  .input-field {
    width:100%; padding:13px 16px; border:2px solid var(--border); border-radius:10px;
    font-family:'Mukta',sans-serif; font-size:16px; color:var(--ink); outline:none;
    margin-bottom:12px; appearance:none;
  }
  .input-field:focus { border-color:var(--primary); }

  .fab {
    position:fixed; bottom:80px; right:20px; width:56px; height:56px;
    background:linear-gradient(135deg,var(--primary),#5B21B6);
    border:none; border-radius:50%; color:white; font-size:28px;
    cursor:pointer; box-shadow:0 4px 20px rgba(124,58,237,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:50; transition:transform 0.2s;
  }
  .fab:active { transform:scale(0.92); }

  .empty { text-align:center; padding:48px 16px; color:var(--ink-muted); }
  .empty .e-icon { font-size:48px; margin-bottom:12px; }

  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:white; padding:11px 22px; border-radius:50px;
    font-size:14px; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .shop-banner {
    background:linear-gradient(135deg,var(--primary),#5B21B6);
    color:white; border-radius:var(--radius); padding:20px; margin-bottom:16px;
  }
  .shop-banner h2 { font-family:'Baloo 2',cursive; font-size:20px; font-weight:800; }
  .shop-banner p { opacity:0.85; font-size:14px; margin-top:4px; }

  .no-shop-card {
    background:white; border-radius:var(--radius); padding:32px; text-align:center;
    box-shadow:var(--shadow);
  }

  select.input-field { background:white; }
</style>
</head>
<body>

<!-- AUTH -->
<div id="authWrap" class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🏪 Seller Panel</div>
    <div class="auth-sub">Smart Kirana — Seller Dashboard</div>
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="seller@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="doLogin()">🔓 Login करें</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none">
      <div class="form-group"><label>पूरा नाम</label><input type="text" id="regName" placeholder="आपका नाम"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="email@example.com"/></div>
      <div class="form-group"><label>फोन</label><input type="tel" id="regPhone" placeholder="10 अंक"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="••••••••"/></div>
      <button class="btn btn-primary" onclick="doRegister()">✅ Register करें</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="top-bar">
    <div class="top-bar-title" id="topBarTitle">📊 Dashboard</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Dashboard -->
  <div class="screen active" id="screenDash">
    <div id="shopBanner"></div>
    <div class="stats-grid" id="dashStats"></div>
    <div class="section-title">📦 हाल की बुकिंग</div>
    <div id="recentBookings"></div>
  </div>

  <!-- Products -->
  <div class="screen" id="screenProducts">
    <div class="section-title">🛒 मेरे उत्पाद</div>
    <div id="productsList"></div>
  </div>
  <button class="fab" id="fabAdd" onclick="openAddProduct()" style="display:none">+</button>

  <!-- Bookings -->
  <div class="screen" id="screenBookings">
    <div class="section-title">📋 सभी बुकिंग</div>
    <div style="display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;">
      <button class="status-btn btn-ready" style="flex:none;padding:8px 16px;" onclick="filterBookings('all')">सभी</button>
      <button class="status-btn" style="flex:none;padding:8px 16px;background:#FEF3C7;color:#D97706;" onclick="filterBookings('pending')">Pending</button>
      <button class="status-btn btn-ready" style="flex:none;padding:8px 16px;" onclick="filterBookings('ready')">Ready</button>
      <button class="status-btn btn-done" style="flex:none;padding:8px 16px;" onclick="filterBookings('completed')">Completed</button>
    </div>
    <div id="bookingsList"></div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchScreen('screenDash','📊 Dashboard',this)">
      <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
    </button>
    <button class="nav-item" onclick="switchScreen('screenProducts','🛒 Products',this)">
      <span class="nav-icon">🛒</span><span class="nav-label">Products</span>
    </button>
    <button class="nav-item" onclick="switchScreen('screenBookings','📋 Bookings',this)">
      <span class="nav-icon">📋</span><span class="nav-label">Bookings</span>
    </button>
  </div>
</div>

<!-- ADD/EDIT PRODUCT MODAL -->
<div class="modal-overlay" id="productModal">
  <div class="modal-sheet">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">➕ नया उत्पाद जोड़ें</div>
    <input class="input-field" id="pName" placeholder="उत्पाद का नाम (जैसे: चावल)" />
    <input class="input-field" id="pPrice" type="number" placeholder="कीमत ₹" />
    <input class="input-field" id="pStock" type="number" placeholder="स्टॉक" />
    <select class="input-field" id="pUnit">
      <option value="kg">किलोग्राम (kg)</option>
      <option value="piece">नग (piece)</option>
      <option value="litre">लीटर (litre)</option>
      <option value="packet">पैकेट</option>
      <option value="dozen">दर्जन</option>
    </select>
    <button class="btn btn-primary" onclick="saveProduct()">💾 सेव करें</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let token = localStorage.getItem('sellerToken');
let sellerData = JSON.parse(localStorage.getItem('sellerData') || '{}');
let allBookings = [];
let editingProduct = null;

if (token) initApp();

function switchTab(t) {
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('registerForm').style.display = t==='register'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1)));
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (!email||!pass) return toast('⚠️ सभी फील्ड भरें');
  try {
    const res = await post('/auth/seller/login',{email,password:pass});
    if (res.error) return toast('❌ '+res.error);
    localStorage.setItem('sellerToken', res.token);
    localStorage.setItem('sellerData', JSON.stringify(res.seller));
    token = res.token; sellerData = res.seller;
    initApp();
  } catch(e){ toast('❌ लॉगिन विफल'); }
}

async function doRegister() {
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const phone=document.getElementById('regPhone').value.trim();
  const pass=document.getElementById('regPass').value;
  if (!name||!email||!phone||!pass) return toast('⚠️ सभी फील्ड भरें');
  try {
    const res = await post('/auth/seller/register',{name,email,phone,password:pass});
    if (res.error) return toast('❌ '+res.error);
    localStorage.setItem('sellerToken', res.token);
    localStorage.setItem('sellerData', JSON.stringify(res.seller));
    token = res.token; sellerData = res.seller;
    initApp();
  } catch(e){ toast('❌ Registration विफल'); }
}

function logout() {
  localStorage.removeItem('sellerToken');
  localStorage.removeItem('sellerData');
  location.reload();
}

async function initApp() {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadDashboard();
}

async function loadDashboard() {
  // Shop banner
  const shopId = sellerData.shopId;
  if (shopId) {
    try {
      const shop = await get(`/shops/${shopId}`);
      document.getElementById('shopBanner').innerHTML = `
        <div class="shop-banner">
          <h2>🏪 ${shop.name}</h2>
          <p>📞 ${shop.phone} ${shop.upiId?'· 💳 '+shop.upiId:''}</p>
        </div>`;
      document.getElementById('fabAdd').style.display = 'flex';
    } catch(e){}
  } else {
    document.getElementById('shopBanner').innerHTML = `
      <div class="no-shop-card">
        <div style="font-size:40px;margin-bottom:12px">⏳</div>
        <div style="font-family:'Baloo 2',cursive;font-size:18px;font-weight:700;">Shop Assigned नहीं हुई</div>
        <p style="color:var(--ink-muted);margin-top:8px;font-size:14px;">Admin आपको जल्द shop assign करेगा</p>
      </div>`;
  }

  // Load bookings for stats
  try {
    const bookings = await authGet('/bookings/seller/mine');
    allBookings = bookings;
    const pending = bookings.filter(b=>b.status==='pending').length;
    const ready = bookings.filter(b=>b.status==='ready').length;
    const done = bookings.filter(b=>b.status==='completed').length;
    document.getElementById('dashStats').innerHTML = `
      <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-num">${pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-icon">✅</div><div class="stat-num">${ready}</div><div class="stat-label">Ready</div></div>
      <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-num">${done}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-icon">📦</div><div class="stat-num">${bookings.length}</div><div class="stat-label">Total</div></div>`;

    const recent = bookings.slice(0,5);
    document.getElementById('recentBookings').innerHTML = recent.length
      ? recent.map(b=>bookingCard(b,true)).join('')
      : '<div class="empty"><div class="e-icon">📭</div><p>कोई बुकिंग नहीं</p></div>';
  } catch(e){}
}

async function loadProducts() {
  if (!sellerData.shopId) {
    document.getElementById('productsList').innerHTML = '<div class="empty"><div class="e-icon">🏪</div><p>पहले shop assign होनी चाहिए</p></div>';
    return;
  }
  try {
    const products = await get(`/products/shop/${sellerData.shopId}`);
    document.getElementById('productsList').innerHTML = products.length
      ? products.map(p=>`
        <div class="item-card">
          <div class="item-icon">🛒</div>
          <div class="item-info">
            <div class="item-name">${p.name}</div>
            <div class="item-meta">स्टॉक: ${p.stock} ${p.unit}</div>
            <div class="item-price">₹${p.price}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn edit-btn" onclick='openEditProduct(${JSON.stringify(p)})'>✏️</button>
            <button class="icon-btn del-btn" onclick="deleteProduct('${p._id}')">🗑️</button>
          </div>
        </div>`).join('')
      : '<div class="empty"><div class="e-icon">📦</div><p>कोई उत्पाद नहीं — + से जोड़ें</p></div>';
  } catch(e){ toast('❌ उत्पाद लोड विफल'); }
}

async function loadBookings() {
  try {
    const bookings = await authGet('/bookings/seller/mine');
    allBookings = bookings;
    renderBookings(bookings);
  } catch(e){ toast('❌ बुकिंग लोड विफल'); }
}

function filterBookings(status) {
  const list = status==='all' ? allBookings : allBookings.filter(b=>b.status===status);
  renderBookings(list);
}

function renderBookings(bookings) {
  document.getElementById('bookingsList').innerHTML = bookings.length
    ? bookings.map(b=>bookingCard(b,false)).join('')
    : '<div class="empty"><div class="e-icon">📭</div><p>कोई बुकिंग नहीं</p></div>';
}

function bookingCard(b, mini) {
  const trust = b.trustScoreSnapshot || 5;
  const stars = '⭐'.repeat(Math.min(5,Math.max(1,Math.round(trust/2))));
  const timeLeft = Math.max(0, Math.floor((new Date(b.expiresAt)-Date.now())/60000));
  const statusClass = `status-${b.status}`;
  const statusText = {pending:'⏳ Pending',ready:'✅ Ready',completed:'🏆 Done',cancelled:'❌ Cancelled'}[b.status];
  return `
    <div class="booking-card">
      <div class="booking-header">
        <span class="booking-id">${b.bookingId}</span>
        <span class="status-badge ${statusClass}">${statusText}</span>
      </div>
      <div class="booking-row">👤 ${b.customerName} &nbsp;|&nbsp; 📞 ${b.phone}</div>
      <div class="booking-row">
        <span class="trust-stars">${stars}</span> Trust: ${trust}
        &nbsp;|&nbsp; ⏳ <span class="timer-text">${timeLeft} मिनट</span>
      </div>
      <div class="booking-row">📦 ${b.productId?.name||'—'} × ${b.quantity}</div>
      ${!mini && b.status==='pending' ? `
        <div class="status-actions">
          <button class="status-btn btn-ready" onclick="updateStatus('${b._id}','ready')">✅ Mark Ready</button>
          <button class="status-btn btn-done" onclick="updateStatus('${b._id}','completed')">🏆 Completed</button>
        </div>` : ''}
      ${!mini && b.status==='ready' ? `
        <div class="status-actions">
          <button class="status-btn btn-done" onclick="updateStatus('${b._id}','completed')" style="flex:1">🏆 Mark Completed</button>
        </div>` : ''}
    </div>`;
}

async function updateStatus(id, status) {
  try {
    await authPut(`/bookings/${id}/status`,{status});
    toast('✅ Status updated!');
    loadBookings();
    loadDashboard();
  } catch(e){ toast('❌ Update विफल'); }
}

// Products CRUD
function openAddProduct() {
  editingProduct = null;
  document.getElementById('modalTitle').textContent = '➕ नया उत्पाद जोड़ें';
  document.getElementById('pName').value='';
  document.getElementById('pPrice').value='';
  document.getElementById('pStock').value='';
  document.getElementById('pUnit').value='kg';
  document.getElementById('productModal').classList.add('open');
}

function openEditProduct(p) {
  editingProduct = p;
  document.getElementById('modalTitle').textContent = '✏️ उत्पाद संपादित करें';
  document.getElementById('pName').value = p.name;
  document.getElementById('pPrice').value = p.price;
  document.getElementById('pStock').value = p.stock;
  document.getElementById('pUnit').value = p.unit;
  document.getElementById('productModal').classList.add('open');
}

function closeModal() {
  document.getElementById('productModal').classList.remove('open');
}

async function saveProduct() {
  const name=document.getElementById('pName').value.trim();
  const price=document.getElementById('pPrice').value;
  const stock=document.getElementById('pStock').value;
  const unit=document.getElementById('pUnit').value;
  if (!name||!price) return toast('⚠️ नाम और कीमत जरूरी है');
  try {
    if (editingProduct) {
      await authPut(`/products/${editingProduct._id}`,{name,price:+price,stock:+stock,unit});
      toast('✅ उत्पाद अपडेट हुआ!');
    } else {
      await authPost('/products',{name,price:+price,stock:+stock,unit});
      toast('✅ उत्पाद जोड़ा गया!');
    }
    closeModal();
    loadProducts();
  } catch(e){ toast('❌ सेव विफल'); }
}

async function deleteProduct(id) {
  if (!confirm('क्या आप यह उत्पाद हटाना चाहते हैं?')) return;
  try {
    await authDel(`/products/${id}`);
    toast('🗑️ उत्पाद हटाया गया');
    loadProducts();
  } catch(e){ toast('❌ Delete विफल'); }
}

function switchScreen(id, title, el) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('topBarTitle').textContent = title;
  document.getElementById('fabAdd').style.display = id==='screenProducts' && sellerData.shopId ? 'flex':'none';
  if (id==='screenProducts') loadProducts();
  if (id==='screenBookings') loadBookings();
  if (id==='screenDash') loadDashboard();
}

// HTTP helpers
async function get(url) {
  const r = await fetch(API+url); return r.json();
}
async function post(url,body) {
  const r = await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r.json();
}
async function authGet(url) {
  const r = await fetch(API+url,{headers:{Authorization:'Bearer '+token}}); return r.json();
}
async function authPost(url,body) {
  const r = await fetch(API+url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
  return r.json();
}
async function authPut(url,body) {
  const r = await fetch(API+url,{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify(body)});
  return r.json();
}
async function authDel(url) {
  const r = await fetch(API+url,{method:'DELETE',headers:{Authorization:'Bearer '+token}}); return r.json();
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
